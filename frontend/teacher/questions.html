<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASAG — Questions</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    nav a { color: var(--muted); font-size: .9rem; padding: .2rem .5rem; border-radius: 4px; }
    nav a.active, nav a:hover { color: var(--accent); background: #eef1ff; text-decoration: none; }
    nav { display: flex; gap: .25rem; margin-left: auto; }
    .actions { display: flex; gap: .5rem; flex-wrap: wrap; }
    .tag { display: inline-block; background: var(--bg); border: 1px solid var(--border);
           border-radius: 99px; padding: 1px 8px; font-size: .75rem; color: var(--muted); }
    .del-btn { background: none; border: none; color: #ccc; cursor: pointer; font-size: 1rem; padding: 0 4px; }
    .del-btn:hover { color: var(--danger); }
    .import-area { border: 2px dashed var(--border); border-radius: var(--radius);
                   padding: 2rem; text-align: center; cursor: pointer; color: var(--muted);
                   font-size: .9rem; transition: border-color .15s; }
    .import-area:hover { border-color: var(--accent); color: var(--accent); }
    #file-input { display: none; }
  </style>
</head>
<body>
<header>
  <h1>ASAG</h1>
  <span class="pill">Teacher</span>
  <nav>
    <a href="questions.html" class="active">Questions</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="dashboard-questions.html">Per Question</a>
    <a href="../login.html" onclick="logout()">Logout</a>
  </nav>
</header>

<div class="container">

  <!-- Question list -->
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
      <h2 style="margin:0">Question Bank</h2>
      <div class="actions">
        <button class="btn-ghost" onclick="exportPaper()">&#8595; Export JSON</button>
        <button class="btn-ghost" onclick="document.getElementById('file-input').click()">&#8593; Import JSON</button>
        <input type="file" id="file-input" accept=".json" onchange="importPaper(event)">
      </div>
    </div>
    <div id="q-list-status" class="status-bar"></div>
    <div style="overflow-x:auto">
      <table id="q-table">
        <thead><tr>
          <th>#</th><th>Question</th><th>Subject</th><th>Max marks</th><th>Dashboard</th><th></th>
        </tr></thead>
        <tbody id="q-body"></tbody>
      </table>
    </div>
    <p id="q-empty" style="color:var(--muted);font-size:.9rem;margin-top:1rem;display:none">No questions yet. Create one below.</p>
  </div>

  <!-- Create question -->
  <div class="card">
    <h2>Add Question</h2>
    <div class="field">
      <label for="q-text">Question text</label>
      <input type="text" id="q-text" placeholder="e.g. What is photosynthesis?">
    </div>
    <div class="field">
      <label for="q-ref">Reference / model answer</label>
      <textarea id="q-ref" rows="3" placeholder="The ideal answer the system grades against…"></textarea>
    </div>
    <div class="row">
      <div class="field">
        <label for="q-subject">Subject</label>
        <input type="text" id="q-subject" placeholder="Biology">
      </div>
      <div class="field">
        <label for="q-marks">Max marks</label>
        <input type="number" id="q-marks" value="5" min="1" max="100" step="0.5">
      </div>
    </div>
    <div id="create-status" class="status-bar"></div>
    <button class="btn-primary" onclick="createQuestion()">+ Add Question</button>
  </div>

</div>

<script>
const API = '/';
function key() { return localStorage.getItem('asag_key') || ''; }
function h()   { return { 'Content-Type': 'application/json', 'X-API-Key': key() }; }
function logout() { localStorage.removeItem('asag_key'); }

function setStatus(id, cls, msg) {
  const el = document.getElementById(id);
  el.className = 'status-bar ' + cls;
  el.textContent = msg;
}

// ── load questions ────────────────────────────────────────────────────────────
async function loadQuestions() {
  const res = await fetch(API + 'questions', { headers: h() });
  const qs  = await res.json();
  const tbody = document.getElementById('q-body');
  document.getElementById('q-empty').style.display = qs.length ? 'none' : 'block';
  tbody.innerHTML = qs.map((q, i) => `
    <tr>
      <td>${i + 1}</td>
      <td style="max-width:320px"><span title="${esc(q.text)}">${esc(q.text.slice(0, 80))}${q.text.length > 80 ? '…' : ''}</span></td>
      <td>${q.subject ? `<span class="tag">${esc(q.subject)}</span>` : '—'}</td>
      <td>${q.max_marks}</td>
      <td><a href="dashboard.html?q=${q.id}">View &rarr;</a></td>
      <td><button class="del-btn" title="Delete" onclick="deleteQ('${q.id}')">&#128465;</button></td>
    </tr>`).join('');
}

// ── create ────────────────────────────────────────────────────────────────────
async function createQuestion() {
  const text    = document.getElementById('q-text').value.trim();
  const ref     = document.getElementById('q-ref').value.trim();
  const subject = document.getElementById('q-subject').value.trim();
  const marks   = parseFloat(document.getElementById('q-marks').value) || 5;
  if (!text || !ref) { setStatus('create-status', 'error', 'Question and reference answer are required.'); return; }

  const res = await fetch(API + 'questions', {
    method: 'POST', headers: h(),
    body: JSON.stringify({ text, reference_answer: ref, subject, max_marks: marks }),
  });
  if (!res.ok) { setStatus('create-status', 'error', 'Failed to save.'); return; }
  setStatus('create-status', 'ok', 'Question added.');
  document.getElementById('q-text').value = '';
  document.getElementById('q-ref').value  = '';
  await loadQuestions();
}

// ── delete ────────────────────────────────────────────────────────────────────
async function deleteQ(id) {
  if (!confirm('Delete this question?')) return;
  await fetch(API + 'questions/' + id, { method: 'DELETE', headers: h() });
  await loadQuestions();
}

// ── export ────────────────────────────────────────────────────────────────────
async function exportPaper() {
  const res = await fetch(API + 'questions', { headers: h() });
  const qs  = await res.json();
  const paper = {
    title: 'Question Paper',
    exported_at: new Date().toISOString(),
    questions: qs.map(q => ({
      text: q.text,
      reference_answer: q.reference_answer,
      subject: q.subject,
      max_marks: q.max_marks,
    })),
  };
  download('question_paper.json', JSON.stringify(paper, null, 2));
}

// ── import ────────────────────────────────────────────────────────────────────
async function importPaper(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  const text = await file.text();
  let paper;
  try { paper = JSON.parse(text); } catch { setStatus('q-list-status', 'error', 'Invalid JSON file.'); return; }

  const qs = paper.questions || paper; // accept bare array too
  if (!Array.isArray(qs)) { setStatus('q-list-status', 'error', 'JSON must have a "questions" array.'); return; }

  setStatus('q-list-status', 'info', `Importing ${qs.length} questions…`);
  let ok = 0;
  for (const q of qs) {
    const r = await fetch(API + 'questions', {
      method: 'POST', headers: h(),
      body: JSON.stringify({
        text: q.text || q.question || '',
        reference_answer: q.reference_answer || q.answer || '',
        subject: q.subject || '',
        max_marks: q.max_marks || 5,
      }),
    });
    if (r.ok) ok++;
  }
  setStatus('q-list-status', 'ok', `Imported ${ok} / ${qs.length} questions.`);
  evt.target.value = '';
  await loadQuestions();
}

function download(name, content) {
  const a = Object.assign(document.createElement('a'), {
    href: 'data:application/json,' + encodeURIComponent(content),
    download: name,
  });
  a.click();
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// guard
if (!localStorage.getItem('asag_key')) location.href = '../login.html';
loadQuestions();
</script>
</body>
</html>
