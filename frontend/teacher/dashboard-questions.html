<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASAG — Per Question</title>
  <link rel="stylesheet" href="../style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    nav a { color:var(--muted); font-size:.9rem; padding:.2rem .5rem; border-radius:4px; }
    nav a.active, nav a:hover { color:var(--accent); background:#eef1ff; text-decoration:none; }
    nav { display:flex; gap:.25rem; margin-left:auto; }
    .chart-wrap { position:relative; height:260px; }
    .answer-preview { max-width:300px; overflow:hidden;
      display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
  </style>
</head>
<body>
<header>
  <h1>ASAG</h1>
  <span class="pill">Teacher</span>
  <nav>
    <a href="questions.html">Questions</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="dashboard-questions.html" class="active">Per Question</a>
    <a href="../login.html" onclick="logout()">Logout</a>
  </nav>
</header>

<div class="container">

  <!-- No cache warning -->
  <div id="no-cache" class="status-bar error" style="display:none">
    No grading data found. Go to <a href="dashboard.html">Dashboard</a> and click "Grade All Questions" first.
  </div>

  <!-- Question selector -->
  <div class="card" id="selector-card" style="display:none">
    <h2>Select Question</h2>
    <div class="field">
      <label for="q-select">Question</label>
      <select id="q-select" onchange="onSelect()">
        <option value="">— choose a question —</option>
      </select>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row" id="stats" style="display:none">
    <div class="stat"><div class="val" id="s-n">—</div><div class="lbl">Responses</div></div>
    <div class="stat"><div class="val" id="s-mean">—</div><div class="lbl">Mean</div></div>
    <div class="stat"><div class="val" id="s-median">—</div><div class="lbl">Median</div></div>
    <div class="stat"><div class="val" id="s-pass">—</div><div class="lbl">Pass rate (≥60%)</div></div>
  </div>

  <!-- Chart -->
  <div class="card" id="chart-card" style="display:none">
    <h2 id="chart-title">Grade Distribution</h2>
    <div class="chart-wrap"><canvas id="dist-chart"></canvas></div>
  </div>

  <!-- Table -->
  <div class="card" id="table-card" style="display:none">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
      <h2 style="margin:0">Student Answers</h2>
      <button class="btn-ghost" onclick="exportCSV()">&#8595; Export CSV</button>
    </div>
    <div style="overflow-x:auto">
      <table>
        <thead><tr>
          <th>Rank</th><th>Name</th><th>Roll No.</th><th>Answer</th>
          <th>Grade</th><th>/ Max</th><th>Sim.</th><th>Keyword</th>
        </tr></thead>
        <tbody id="result-body"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
let chartInst = null;
let summary   = null;
let currentQ  = null;

function logout() { localStorage.removeItem('asag_key'); }
function esc(s)   { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(v)   { return v !== undefined ? Number(v).toFixed(3) : '—'; }

function init() {
  if (!localStorage.getItem('asag_key')) { location.href = '../login.html'; return; }

  const cached = localStorage.getItem('asag_grade_summary');
  if (!cached) { document.getElementById('no-cache').style.display='block'; return; }

  summary = JSON.parse(cached);
  document.getElementById('selector-card').style.display = 'block';

  const sel = document.getElementById('q-select');
  summary.questions.forEach(q => {
    const n = Object.values(summary.students).filter(st => st.grades[q.id] !== undefined).length;
    const o = document.createElement('option');
    o.value = q.id;
    o.textContent = q.text.slice(0, 90) + (n ? '' : '  (no responses)');
    sel.appendChild(o);
  });

  // auto-select from URL
  const qid = new URLSearchParams(location.search).get('q');
  if (qid) { sel.value = qid; onSelect(); }
}

function onSelect() {
  const qid = document.getElementById('q-select').value;
  if (!qid) { ['stats','chart-card','table-card'].forEach(id => document.getElementById(id).style.display='none'); return; }

  currentQ = summary.questions.find(q => q.id === qid);
  const rows = Object.values(summary.students)
    .filter(st => st.grades[qid] !== undefined)
    .map(st => ({
      name: st.name, roll: st.roll,
      grade: st.grades[qid].grade,
      answer: st.grades[qid].answer,
      features: st.grades[qid].features,
    }))
    .sort((a,b) => b.grade - a.grade);

  document.getElementById('chart-title').textContent =
    `Grade Distribution — ${currentQ.text.slice(0, 60)}`;

  renderStats(rows, currentQ.max_marks);
  renderChart(rows, currentQ.max_marks);
  renderTable(rows, currentQ.max_marks);

  ['stats','chart-card','table-card'].forEach(id =>
    document.getElementById(id).style.display = id === 'stats' ? 'flex' : 'block');
}

function renderStats(rows, maxMarks) {
  const vals = rows.map(r => r.grade).sort((a,b)=>a-b);
  const n    = vals.length;
  document.getElementById('s-n').textContent = n;
  if (!n) {
    document.getElementById('s-mean').textContent   = '—';
    document.getElementById('s-median').textContent = '—';
    document.getElementById('s-pass').textContent   = '—';
    return;
  }
  const mean = vals.reduce((s,v)=>s+v,0)/n;
  const med  = n%2 ? vals[Math.floor(n/2)] : (vals[n/2-1]+vals[n/2])/2;
  const pass = vals.filter(v => v/maxMarks >= 0.6).length;
  document.getElementById('s-mean').textContent   = mean.toFixed(2);
  document.getElementById('s-median').textContent = med.toFixed(2);
  document.getElementById('s-pass').textContent   = Math.round(pass/n*100) + '%';
}

function renderChart(rows, maxMarks) {
  const labels = ['0–20%','20–40%','40–60%','60–80%','80–100%'];
  const counts = Array(5).fill(0);
  rows.forEach(r => counts[Math.min(Math.floor(r.grade/maxMarks*5),4)]++);
  const colors = ['rgba(229,57,53,.75)','rgba(251,140,0,.75)',
                  'rgba(253,216,53,.75)','rgba(102,187,106,.75)','rgba(66,165,245,.75)'];
  if (chartInst) chartInst.destroy();
  chartInst = new Chart(document.getElementById('dist-chart'), {
    type: 'bar',
    data: { labels, datasets:[{ label:'Students', data:counts,
      backgroundColor:colors, borderRadius:6, borderSkipped:false }] },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false} },
      scales:{
        y:{ beginAtZero:true, ticks:{stepSize:1,precision:0}, grid:{color:'#f0f0f0'},
            title:{display:true,text:'Students'} },
        x:{ grid:{display:false}, title:{display:true,text:'Score band'} },
      },
    },
  });
}

function renderTable(rows, maxMarks) {
  document.getElementById('result-body').innerHTML = rows.map((r, i) => {
    const pct = Math.round(r.grade/maxMarks*100);
    const cls = pct>=60?'grade-high':pct>=40?'grade-mid':'grade-low';
    const f   = r.features;
    return `<tr>
      <td>${i+1}</td>
      <td>${esc(r.name)}</td>
      <td><a href="dashboard-student.html?roll=${encodeURIComponent(r.roll)}">${esc(r.roll)}</a></td>
      <td><p class="answer-preview" title="${esc(r.answer)}">${esc(r.answer)}</p></td>
      <td><span class="grade-badge ${cls}">${r.grade.toFixed(2)}</span></td>
      <td>${maxMarks}</td>
      <td>${fmt(f.sim_with_demotion)}</td>
      <td>${fmt(f.keyword_coverage)}</td>
    </tr>`;
  }).join('');
}

function exportCSV() {
  if (!currentQ) return;
  const maxMarks = currentQ.max_marks;
  const header = ['name','roll_number','grade','max_marks','percentage',
                  'sim_with_demotion','keyword_coverage','length_ratio','jaccard_unigram'];
  const rows = Object.values(summary.students)
    .filter(st => st.grades[currentQ.id])
    .map(st => {
      const g = st.grades[currentQ.id];
      const f = g.features;
      return [st.name, st.roll, g.grade, maxMarks,
              Math.round(g.grade/maxMarks*100)+'%',
              f.sim_with_demotion, f.keyword_coverage,
              f.length_ratio, f.jaccard_unigram].join(',');
    });
  const blob = new Blob([[header.join(','),...rows].join('\n')],{type:'text/csv'});
  Object.assign(document.createElement('a'),
    {href:URL.createObjectURL(blob),download:`q_grades.csv`}).click();
}

init();
</script>
</body>
</html>
